[Paths]
; Ajuste o nome do servidor/compartilhamento conforme sua rede.
AcervoSaidasCNC = \\SERVIDOR-PCP\PlanoCorte\acervo_cnc
SaidasCnc = C:\PCP\cache\{machine}\saidas_cnc
SaidasCortadas = \\SERVIDOR-PCP\PlanoCorte\saidas_cortadas\{machine}
PlanoCorte = \\SERVIDOR-PCP\PlanoCorte\plano_corte
DadosXml = \\SERVIDOR-PCP\PlanoCorte\dados\dados_{date}.xml
LocksFile = \\SERVIDOR-PCP\PlanoCorte\app_data\active_locks.json
OfflineQueueDir = C:\PCP\cache\{machine}\offline_queue

[Machine]
; Use PCP_MACHINE_ID na inicializacao para diferenciar as maquinas sem editar o arquivo.
current_machine = Bodor1 (12K)
available_machines = Bodor1 (12K), Bodor2 (6K), Bodor3 (4K), Bodor4 (3K), Trumpf1, Trumpf2

[Auth]
admin_user = PCP01
admin_pass = altere_aqui
